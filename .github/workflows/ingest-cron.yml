name: Ingest cron

on:
  schedule:
    # Cada 5 min. GitHub Actions dispara el pipeline (Vercel Hobby limita los
    # cron a 1/día, así que NO se usa Vercel Cron). El scheduler es best-effort:
    # bajo carga de GitHub la corrida puede atrasarse varios minutos o saltarse.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest
        run: |
          curl -s -X GET "${{ secrets.SITE_URL }}/api/ingest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
